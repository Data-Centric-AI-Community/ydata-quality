name: Prerelease

on:
  release:
    types:
    - prereleased

permissions:
  contents: write
  id-token: write

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-22.04

    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
    - name: Version
      id: version
      run: echo ::set-output name=value::`echo ${{ github.ref }} | sed -n -E 's/refs\/tags\/build\/([0-9]+.[0-9]+.[0-9]+)\/([[:alnum:]])/\1.\2/p'`

  package:
    name: Build and Package
    runs-on: ubuntu-22.04

    needs: prepare

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python 3.7
      uses: actions/setup-python@v4
      with:
        python-version: '3.7'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install wheel

    - name: Build package
      run: make package PYTHON=python version=${{ steps.version.outputs.value }}

    - name: Upload Pipeline Artifacts
      uses: actions/upload-artifact@v4
      with:
        retention-days: 1
        name: built-artifacts
        path: dist/
    
  upload-assets:
    name: Upload Assets to Release
    runs-on: ubuntu-22.04

    needs:
    - prepare
    - package

    steps:
    - uses: actions/download-artifact@v4
      with:
        name: built-artifacts
        path: dist/

    - uses: softprops/action-gh-release@v2
      with:
        files: 'dist/*'
        tag_name: ${{ needs.package.outputs.version }}

  publish-private-pypi:
    name: Publish packages to PyPi
    runs-on: ubuntu-22.04

    needs:
    - prepare
    - package

    steps:
    - uses: actions/download-artifact@v4
      with:
        name: built-artifacts
        path: dist/

    - uses: pypa/gh-action-pypi-publish@release/v1
